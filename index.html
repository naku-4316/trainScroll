<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ハイスピード横スクロール アクションベース</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a1026;
      --panel: rgba(9, 16, 41, 0.8);
      --accent: #58d9ff;
      --danger: #ff5e7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1c316e 0%, #050814 65%);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      color: #eaf6ff;
      overflow: hidden;
    }

    .wrapper {
      width: min(960px, 94vw);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: var(--panel);
      backdrop-filter: blur(3px);
      font-size: 14px;
    }

    .game {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      position: relative;
      background: var(--bg);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .note {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.85;
      text-align: center;
    }

    kbd {
      padding: 1px 6px;
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 6px;
      background: rgba(255,255,255,.12);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="hud">
      <div>距離: <span id="distance">0</span> m</div>
      <div>速度: <span id="speed">0</span> km/h</div>
      <div>状態: <span id="state">RUN</span></div>
    </div>
    <div class="game">
      <canvas id="gameCanvas" width="1280" height="720" aria-label="高速横スクロールアクションゲームベース"></canvas>
    </div>
    <p class="note">操作: <kbd>Space</kbd>/<kbd>↑</kbd> ジャンプ, <kbd>Shift</kbd> ダッシュ, <kbd>R</kbd> リスタート</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
